<!DOCTYPE html>
<html>
<head>
    <title>Order Summary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2 class="title">Order Summary 🛍️</h2>

<div class="summary-box">

    <div class="item-row">
        <span>Burger</span>
        <span>₹100</span>
    </div>

    <div class="item-row">
        <span>Pizza</span>
        <span>₹200</span>
    </div>

    <hr>

    <div class="item-row total">
        <span>Total</span>
        <span>₹300</span>
    </div>

</div>

<a href="#" class="place-btn">Place Order</a>

<p class="success">Order placed successfully 🎉</p>

</body>
</html>
